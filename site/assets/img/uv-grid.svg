<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 360" width="420" height="360" font-family="system-ui, sans-serif">
  <rect width="420" height="360" fill="#fff"/>
  <!-- grade 8x8 de pixels -->
  <g transform="translate(70,40)">
    <!-- celulas, cor = (uv.x, uv.y, 0) pra ilustrar o gradiente -->
    <g>
      <!-- gerada com cor por celula: R=col/7, G=row-de-baixo/7, B=0 -->
      <!-- linha de cima (v alto) ... linha de baixo (v=0). Cada cel 30px -->
      <!-- row index r de cima(0) a baixo(7); uv.y = (7-r+0.5)/8 -->
      <rect x="0"   y="0"   width="30" height="30" fill="rgb(18,233,0)"/>
      <rect x="30"  y="0"   width="30" height="30" fill="rgb(54,233,0)"/>
      <rect x="60"  y="0"   width="30" height="30" fill="rgb(91,233,0)"/>
      <rect x="90"  y="0"   width="30" height="30" fill="rgb(127,233,0)"/>
      <rect x="120" y="0"   width="30" height="30" fill="rgb(163,233,0)"/>
      <rect x="150" y="0"   width="30" height="30" fill="rgb(200,233,0)"/>
      <rect x="180" y="0"   width="30" height="30" fill="rgb(236,233,0)"/>
      <rect x="210" y="0"   width="30" height="30" fill="rgb(255,233,0)"/>
    </g>
    <!-- moldura e linhas da grade -->
    <g stroke="#bbb" stroke-width="1">
      <line x1="0" y1="30" x2="240" y2="30"/>
      <line x1="0" y1="60" x2="240" y2="60"/>
      <line x1="0" y1="90" x2="240" y2="90"/>
      <line x1="0" y1="120" x2="240" y2="120"/>
      <line x1="0" y1="150" x2="240" y2="150"/>
      <line x1="0" y1="180" x2="240" y2="180"/>
      <line x1="0" y1="210" x2="240" y2="210"/>
      <line x1="30" y1="0" x2="30" y2="240"/>
      <line x1="60" y1="0" x2="60" y2="240"/>
      <line x1="90" y1="0" x2="90" y2="240"/>
      <line x1="120" y1="0" x2="120" y2="240"/>
      <line x1="150" y1="0" x2="150" y2="240"/>
      <line x1="180" y1="0" x2="180" y2="240"/>
      <line x1="210" y1="0" x2="210" y2="240"/>
    </g>
    <rect x="0" y="0" width="240" height="240" fill="none" stroke="#333" stroke-width="2"/>

    <!-- destaque de um pixel e seu endereco -->
    <rect x="60" y="150" width="30" height="30" fill="none" stroke="#e8590c" stroke-width="3"/>
    <text x="75" y="200" fill="#e8590c" font-size="11" text-anchor="middle">este pixel</text>
    <text x="75" y="213" fill="#e8590c" font-size="11" text-anchor="middle">uv ≈ (0.3, 0.3)</text>

    <!-- eixo X (u) -->
    <line x1="0" y1="252" x2="240" y2="252" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="0"   y="270" font-size="12" text-anchor="middle" fill="#333">0</text>
    <text x="240" y="270" font-size="12" text-anchor="middle" fill="#333">1</text>
    <text x="120" y="285" font-size="13" text-anchor="middle" fill="#1971c2" font-weight="bold">v_uv.x  (esquerda → direita)</text>

    <!-- eixo Y (v) -->
    <line x1="-12" y1="240" x2="-12" y2="0" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="-22" y="244" font-size="12" text-anchor="end" fill="#333">0</text>
    <text x="-22" y="6"   font-size="12" text-anchor="end" fill="#333">1</text>
    <text x="-40" y="120" font-size="13" text-anchor="middle" fill="#2f9e44" font-weight="bold" transform="rotate(-90 -40 120)">v_uv.y  (baixo → cima)</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
</svg>
