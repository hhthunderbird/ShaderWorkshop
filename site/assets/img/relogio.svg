<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" width="640" height="220" font-family="system-ui, sans-serif">
  <rect width="640" height="220" fill="#fff"/>
  <text x="320" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">A cada quadro, a CPU manda a hora pra GPU</text>

  <!-- CPU -->
  <g transform="translate(40,60)">
    <rect x="0" y="0" width="170" height="110" rx="10" fill="#e7f5ff" stroke="#1971c2" stroke-width="2"/>
    <text x="85" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#1971c2">CPU</text>
    <!-- relogio -->
    <circle cx="85" cy="72" r="22" fill="#fff" stroke="#1971c2" stroke-width="2"/>
    <line x1="85" y1="72" x2="85" y2="58" stroke="#1971c2" stroke-width="2"/>
    <line x1="85" y1="72" x2="96" y2="78" stroke="#1971c2" stroke-width="2"/>
    <text x="85" y="108" text-anchor="middle" font-size="11" fill="#666">conta o tempo</text>
  </g>

  <!-- seta com u_time -->
  <g transform="translate(210,115)">
    <line x1="0" y1="0" x2="210" y2="0" stroke="#e8590c" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="55" y="-22" width="110" height="30" rx="6" fill="#fff3bf" stroke="#e8590c"/>
    <text x="110" y="-2" text-anchor="middle" font-size="14" font-weight="bold" fill="#e8590c">u_time</text>
    <text x="110" y="26" text-anchor="middle" font-size="11" fill="#666">o "uniform" do relógio</text>
  </g>

  <!-- GPU -->
  <g transform="translate(440,60)">
    <rect x="0" y="0" width="170" height="110" rx="10" fill="#ebfbee" stroke="#2f9e44" stroke-width="2"/>
    <text x="85" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#2f9e44">GPU</text>
    <text x="85" y="64" text-anchor="middle" font-size="11" fill="#444">milhares de pixels</text>
    <text x="85" y="82" text-anchor="middle" font-size="11" fill="#444">leem a MESMA hora</text>
    <text x="85" y="104" text-anchor="middle" font-size="11" fill="#666">e se movem juntos</text>
  </g>

  <text x="320" y="210" text-anchor="middle" font-size="12" fill="#888">uniform = um valor que a CPU envia igual pra todos os pixels, a cada quadro</text>

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#e8590c"/>
    </marker>
  </defs>
</svg>
