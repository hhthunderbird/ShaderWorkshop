<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" width="720" height="300" font-family="system-ui, sans-serif">
  <rect width="720" height="300" fill="#fff"/>

  <!-- ===== ESQUERDA: 1 pintor (CPU) ===== -->
  <g transform="translate(20,20)">
    <rect x="0" y="0" width="320" height="260" fill="#fff5f5" stroke="#e03131" stroke-width="2" rx="8"/>
    <text x="160" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#e03131">CPU: 1 pintor</text>
    <!-- grade 6x6, so 1 pintada, resto vazio -->
    <g transform="translate(95,46)">
      <!-- celulas -->
      <g stroke="#e9c0c0" fill="#fff">
        <!-- 6x6 de 20px -->
        <g>
          <rect x="0" y="0" width="20" height="20" fill="#e03131"/>
          <rect x="20" y="0" width="20" height="20"/>
          <rect x="40" y="0" width="20" height="20"/>
          <rect x="60" y="0" width="20" height="20"/>
          <rect x="80" y="0" width="20" height="20"/>
          <rect x="100" y="0" width="20" height="20"/>
        </g>
        <g transform="translate(0,20)"><rect x="0" y="0" width="120" height="20"/></g>
        <g transform="translate(0,40)"><rect x="0" y="0" width="120" height="20"/></g>
        <g transform="translate(0,60)"><rect x="0" y="0" width="120" height="20"/></g>
        <g transform="translate(0,80)"><rect x="0" y="0" width="120" height="20"/></g>
        <g transform="translate(0,100)"><rect x="0" y="0" width="120" height="20"/></g>
      </g>
      <rect x="0" y="0" width="120" height="120" fill="none" stroke="#c92a2a" stroke-width="1.5"/>
      <!-- pincel na celula atual -->
      <text x="30" y="15" font-size="14">🖌️</text>
    </g>
    <text x="160" y="200" text-anchor="middle" font-size="12" fill="#444">um quadradinho de cada vez</text>
    <text x="160" y="220" text-anchor="middle" font-size="12" fill="#c92a2a" font-weight="bold">→ lento (espera a fila toda)</text>
  </g>

  <!-- ===== DIREITA: exercito (GPU) ===== -->
  <g transform="translate(380,20)">
    <rect x="0" y="0" width="320" height="260" fill="#ebfbee" stroke="#2f9e44" stroke-width="2" rx="8"/>
    <text x="160" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#2f9e44">GPU: milhares de pintores</text>
    <!-- grade 6x6 toda pintada -->
    <g transform="translate(95,46)">
      <g>
        <rect x="0"   y="0"   width="120" height="120" fill="#2f9e44" opacity="0.85"/>
        <!-- linhas da grade -->
        <g stroke="#fff" stroke-width="1.5">
          <line x1="20" y1="0" x2="20" y2="120"/><line x1="40" y1="0" x2="40" y2="120"/>
          <line x1="60" y1="0" x2="60" y2="120"/><line x1="80" y1="0" x2="80" y2="120"/>
          <line x1="100" y1="0" x2="100" y2="120"/>
          <line x1="0" y1="20" x2="120" y2="20"/><line x1="0" y1="40" x2="120" y2="40"/>
          <line x1="0" y1="60" x2="120" y2="60"/><line x1="0" y1="80" x2="120" y2="80"/>
          <line x1="0" y1="100" x2="120" y2="100"/>
        </g>
        <rect x="0" y="0" width="120" height="120" fill="none" stroke="#2b8a3e" stroke-width="1.5"/>
      </g>
    </g>
    <text x="160" y="200" text-anchor="middle" font-size="12" fill="#444">cada um no SEU quadradinho, ao mesmo tempo</text>
    <text x="160" y="220" text-anchor="middle" font-size="12" fill="#2b8a3e" font-weight="bold">→ instantâneo (todos de uma vez)</text>
  </g>
</svg>
