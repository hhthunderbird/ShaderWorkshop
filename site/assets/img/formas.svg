<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" width="720" height="300" font-family="system-ui, sans-serif">
  <rect width="720" height="300" fill="#fff"/>

  <!-- ===== PAINEL 1: circulo = distancia ao centro ===== -->
  <g transform="translate(20,20)">
    <rect x="0" y="0" width="300" height="240" fill="#fafafa" stroke="#ddd"/>
    <text x="150" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Círculo = distância ao centro</text>
    <!-- circulo -->
    <circle cx="150" cy="135" r="80" fill="#d0ebff" stroke="#1971c2" stroke-width="2"/>
    <!-- centro -->
    <circle cx="150" cy="135" r="4" fill="#1971c2"/>
    <text x="150" y="125" text-anchor="middle" font-size="11" fill="#1971c2">centro</text>
    <!-- raio -->
    <line x1="150" y1="135" x2="230" y2="135" stroke="#e8590c" stroke-width="2"/>
    <text x="190" y="128" text-anchor="middle" font-size="12" fill="#e8590c" font-weight="bold">raio</text>
    <!-- um pixel e sua distancia -->
    <circle cx="205" cy="80" r="4" fill="#2f9e44"/>
    <line x1="150" y1="135" x2="205" y2="80" stroke="#2f9e44" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="184" y="100" font-size="11" fill="#2f9e44">d = length(uv − centro)</text>
    <text x="150" y="232" text-anchor="middle" font-size="11" fill="#666">d &lt; raio → dentro · d &gt; raio → fora</text>
  </g>

  <!-- ===== PAINEL 2: uniao x intersecao ===== -->
  <g transform="translate(380,20)">
    <rect x="0" y="0" width="320" height="240" fill="#fafafa" stroke="#ddd"/>
    <text x="160" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Combinar formas</text>

    <!-- UNIAO: max -->
    <g transform="translate(20,40)">
      <circle cx="55" cy="70" r="42" fill="#ffe3e3" stroke="#e03131" stroke-width="1.5"/>
      <circle cx="95" cy="70" r="42" fill="#ffe3e3" stroke="#e03131" stroke-width="1.5"/>
      <!-- preenche os dois (uniao) por cima de leve -->
      <circle cx="55" cy="70" r="42" fill="#e03131" opacity="0.25"/>
      <circle cx="95" cy="70" r="42" fill="#e03131" opacity="0.25"/>
      <text x="75" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#e03131">União = max</text>
      <text x="75" y="156" text-anchor="middle" font-size="10" fill="#666">os dois carimbos juntos</text>
    </g>

    <!-- INTERSECAO: min -->
    <g transform="translate(180,40)">
      <circle cx="55" cy="70" r="42" fill="none" stroke="#1971c2" stroke-width="1.5"/>
      <circle cx="95" cy="70" r="42" fill="none" stroke="#1971c2" stroke-width="1.5"/>
      <!-- so a lente do meio -->
      <clipPath id="lente"><circle cx="55" cy="70" r="42"/></clipPath>
      <circle cx="95" cy="70" r="42" fill="#1971c2" opacity="0.35" clip-path="url(#lente)"/>
      <text x="75" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#1971c2">Interseção = min</text>
      <text x="75" y="156" text-anchor="middle" font-size="10" fill="#666">só onde os dois encostam</text>
    </g>
  </g>
</svg>
