<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" width="640" height="280" font-family="system-ui, sans-serif">
  <rect width="640" height="280" fill="#fff"/>
  <text x="320" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">UV: o molde que cola a imagem na superfície</text>

  <!-- imagem 2D com coordenadas UV -->
  <g transform="translate(40,60)">
    <rect x="0" y="0" width="180" height="180" fill="#e7f5ff" stroke="#1971c2" stroke-width="2"/>
    <!-- quadrantes ilustrativos -->
    <rect x="0" y="0" width="90" height="90" fill="#ffd5d5"/>
    <rect x="90" y="0" width="90" height="90" fill="#d3f9d8"/>
    <rect x="0" y="90" width="90" height="90" fill="#d0ebff"/>
    <rect x="90" y="90" width="90" height="90" fill="#fff3bf"/>
    <rect x="0" y="0" width="180" height="180" fill="none" stroke="#1971c2" stroke-width="2"/>
    <text x="90" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">a imagem</text>
    <!-- rotulos UV -->
    <text x="-8" y="184" text-anchor="end" font-size="12" fill="#e8590c">(0,0)</text>
    <text x="186" y="184" text-anchor="start" font-size="12" fill="#e8590c">(1,0)</text>
    <text x="-8" y="8" text-anchor="end" font-size="12" fill="#e8590c">(0,1)</text>
    <text x="186" y="8" text-anchor="start" font-size="12" fill="#e8590c">(1,1)</text>
  </g>

  <text x="250" y="156" font-size="26" fill="#888">→</text>
  <text x="250" y="180" font-size="11" fill="#666">UV gruda</text>

  <!-- superficie (face de cubo) recebendo a imagem -->
  <g transform="translate(320,60)">
    <polygon points="20,30 180,10 180,170 20,190" fill="#e7f5ff" stroke="#2f9e44" stroke-width="2"/>
    <!-- mesma divisao em 4, distorcida pela perspectiva -->
    <polygon points="20,30 100,20 100,180 20,190" fill="#ffd5d5" opacity="0.7"/>
    <polygon points="100,20 180,10 180,90 100,100" fill="#d3f9d8" opacity="0.7"/>
    <polygon points="100,100 180,90 180,170 100,180" fill="#fff3bf" opacity="0.7"/>
    <polygon points="20,30 100,20 100,100 20,110" fill="#d0ebff" opacity="0"/>
    <polygon points="20,30 180,10 180,170 20,190" fill="none" stroke="#2f9e44" stroke-width="2"/>
    <text x="100" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b8a3e">a superfície 3D</text>
  </g>

  <text x="320" y="270" text-anchor="middle" font-size="12" fill="#888">Cada ponto da superfície tem um endereço UV (0..1) que diz qual pedaço da imagem usar.</text>
</svg>
